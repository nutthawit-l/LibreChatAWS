apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-pool
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          # Prefer on-demand for inference stability; Spot GPUs are scarce / interruptible
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          # g5g = Graviton2 + NVIDIA T4G; prefer 2xlarge (16Gi) — xlarge 8Gi is often too tight
          values: ["g5g.2xlarge", "g5g.xlarge"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]

      # Karpenter v1: taints live under template.spec (not spec.taints)
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule

  limits:
    cpu: 200

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
