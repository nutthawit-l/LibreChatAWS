apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu
spec:
  # Must match the cluster Kubernetes version (core-cluster is on 1.31).
  # Alias al2023@latest was resolving only x86_64 NVIDIA AMIs → arch conflict with arm64 NodePool.
  amiFamily: AL2023
  amiSelectorTerms:
    - ssmParameter: /aws/service/eks/optimized-ami/1.31/amazon-linux-2023/arm64/nvidia/recommended/image_id
  role: "KarpenterNodeRole-core-cluster"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "core-cluster"

  # Same as default NodeClass — EKS cluster SG only (ALB-controller friendly).
  securityGroupSelectorTerms:
    - tags:
        aws:eks:cluster-name: "core-cluster"

  # Model weights + container layers need disk
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        encrypted: true

  tags:
    Environment: production
    Team: ai
    Workload: gpu
