apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Required in Karpenter v1 — amiFamily is implied by the alias
  amiSelectorTerms:
    - alias: al2023@latest
  role: "KarpenterNodeRole-core-cluster"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "core-cluster"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "core-cluster"

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 40Gi
        volumeType: gp3
        encrypted: true

  tags:
    Environment: production
    Team: ai
