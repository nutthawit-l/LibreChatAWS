apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Required in Karpenter v1 — amiFamily is implied by the alias
  amiSelectorTerms:
    - alias: al2023@latest
  role: "KarpenterNodeRole-core-cluster"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "core-cluster"

  # Use the EKS-managed cluster SG (has kubernetes.io/cluster/<name>).
  # Do NOT select ControlPlaneSecurityGroup via karpenter.sh/discovery — ALB
  # controller requires exactly one ENI SG tagged kubernetes.io/cluster/<name>.
  securityGroupSelectorTerms:
    - tags:
        aws:eks:cluster-name: "core-cluster"

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 40Gi
        volumeType: gp3
        encrypted: true

  tags:
    Environment: production
    Team: ai
