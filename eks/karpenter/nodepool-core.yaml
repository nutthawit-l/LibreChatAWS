apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: core-pool
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]     # ใช้ Spot เป็นหลักเพื่อประหยัด
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]           # Compute / Memory optimized
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]

  limits:
    cpu: 1000   # ปรับตามงบประมาณ

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s