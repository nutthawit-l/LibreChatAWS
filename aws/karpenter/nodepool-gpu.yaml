apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-pool
spec:
  template:
    spec:
      nodeClassRef:
        name: default
      
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]     # GPU Spot มีน้อย จึงเน้น on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          values: [
            "g4dn.xlarge", "g4dn.2xlarge", "g4dn.4xlarge",
            "g5.xlarge", "g5.2xlarge", "g5.4xlarge",
            "p3.2xlarge", "p3.8xlarge"
          ]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]

  # Taints เพื่อให้เฉพาะ Pod ที่ต้องการ GPU เท่านั้นขึ้นมา
  taints:
    - key: nvidia.com/gpu
      value: "true"
      effect: NoSchedule

  limits:
    cpu: 200

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m   # GPU อย่า consolidate บ่อย