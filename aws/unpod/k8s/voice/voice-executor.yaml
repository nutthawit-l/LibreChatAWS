apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-executor-config
data:
  SETTINGS_FILE: "super_services.settings.prod"
  AGENT_NAME: "unpod-prod-general-agent-v3"
  WORKER_HANDLER: "livekit"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-executor
  labels:
    app: voice-executor
    app.kubernetes.io/part-of: unpod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voice-executor
  template:
    metadata:
      labels:
        app: voice-executor
    spec:
      terminationGracePeriodSeconds: 600
      containers:
        - name: voice-executor
          image: unpod-voice-executor:latest
          imagePullPolicy: Always
          command:
            - python
            - "-u"
            - super_services/orchestration/executors/voice_executor_v3.py
          args:
            - start
          envFrom:
            - configMapRef:
                name: voice-executor-config
            - secretRef:
                name: voice-executor-secrets
          resources:
            requests:
              cpu: "8"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 16Gi
          livenessProbe:
            exec:
              command:
                - python
                - super_services/orchestration/executors/voice_executor_v3.py
                - health
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - python
                - super_services/orchestration/executors/voice_executor_v3.py
                - health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: voice-executor
  labels:
    app: voice-executor
spec:
  type: ClusterIP
  selector:
    app: voice-executor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voice-executor
  labels:
    app: voice-executor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voice-executor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
