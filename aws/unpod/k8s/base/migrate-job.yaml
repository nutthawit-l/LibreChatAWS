apiVersion: batch/v1
kind: Job
metadata:
  name: unpod-migrate
  namespace: unpod
  labels:
    app.kubernetes.io/part-of: unpod
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: unpod-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: unpod-backend-core:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for Postgres..."
              until nc -z "$POSTGRES_HOST" "$POSTGRES_PORT"; do sleep 2; done
              python manage.py migrate --no-input
              python manage.py seed_reference_data || true
              python manage.py collectstatic --no-input || true
          envFrom:
            - configMapRef:
                name: unpod-config
            - secretRef:
                name: unpod-secrets
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
