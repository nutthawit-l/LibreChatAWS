apiVersion: v1
kind: ConfigMap
metadata:
  name: centrifugo-config
  labels:
    app: centrifugo
data:
  config.json: |
    {
      "admin": false,
      "allowed_origins": ["*"],
      "log_level": "info",
      "health": true
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: centrifugo
  labels:
    app: centrifugo
    app.kubernetes.io/part-of: unpod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: centrifugo
  template:
    metadata:
      labels:
        app: centrifugo
    spec:
      containers:
        - name: centrifugo
          image: centrifugo/centrifugo:v5
          args: ["centrifugo", "-c", "/centrifugo/config.json"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: unpod-secrets
                  key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
            - name: CENTRIFUGO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: unpod-secrets
                  key: CENTRIFUGO_API_KEY
          volumeMounts:
            - name: config
              mountPath: /centrifugo
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: centrifugo-config
---
apiVersion: v1
kind: Service
metadata:
  name: centrifugo
  labels:
    app: centrifugo
spec:
  selector:
    app: centrifugo
  ports:
    - name: http
      port: 8000
      targetPort: http
