apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-services
  labels:
    app: api-services
    app.kubernetes.io/part-of: unpod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-services
  template:
    metadata:
      labels:
        app: api-services
    spec:
      containers:
        - name: api-services
          image: unpod-api-services:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9116
          envFrom:
            - configMapRef:
                name: unpod-config
            - secretRef:
                name: unpod-secrets
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-services
  labels:
    app: api-services
spec:
  selector:
    app: api-services
  ports:
    - name: http
      port: 9116
      targetPort: http
