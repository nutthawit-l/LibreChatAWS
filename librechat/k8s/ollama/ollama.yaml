apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: librechat
  labels:
    app: ollama
    app.kubernetes.io/part-of: librechat
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: gp3
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: librechat
  labels:
    app: ollama
    app.kubernetes.io/part-of: librechat
    app.kubernetes.io/component: llm
spec:
  replicas: 1
  # Karpenter g5g provision + image pull often exceeds the default 600s
  progressDeadlineSeconds: 1200
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["arm64"]
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    # Prefer 2xlarge (16Gi) — xlarge 8Gi often OOMs with device plugin + kubelet
                    values: ["g5g.2xlarge", "g5g.xlarge"]
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values: ["g5g.2xlarge"]
      containers:
        - name: ollama
          image: ollama/ollama:0.6.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
              nvidia.com/gpu: "1"
            limits:
              memory: 4Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: librechat
  labels:
    app: ollama
    app.kubernetes.io/part-of: librechat
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
