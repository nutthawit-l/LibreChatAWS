apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  labels:
    app: vllm
    app.kubernetes.io/part-of: unpod
data:
  VLLM_MODEL: "Qwen/Qwen2.5-7B-Instruct"
  VLLM_MAX_MODEL_LEN: "8192"
  VLLM_GPU_MEMORY_UTILIZATION: "0.90"
  VLLM_SERVED_MODEL_NAME: "local-llm"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-hf-cache
  labels:
    app: vllm
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: gp2
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: unpod
    app.kubernetes.io/component: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values: ["g5.xlarge", "g5.2xlarge"]
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.8.5
          imagePullPolicy: IfNotPresent
          # Official image ENTRYPOINT is openai.api_server; expand ConfigMap via shell
          command: ["sh", "-c"]
          args:
            - >-
              exec python3 -m vllm.entrypoints.openai.api_server
              --model "${VLLM_MODEL}"
              --host 0.0.0.0
              --port 8000
              --dtype auto
              --max-model-len "${VLLM_MAX_MODEL_LEN}"
              --gpu-memory-utilization "${VLLM_GPU_MEMORY_UTILIZATION}"
              --served-model-name "${VLLM_SERVED_MODEL_NAME}"
          env:
            - name: VLLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: VLLM_MODEL
            - name: VLLM_MAX_MODEL_LEN
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: VLLM_MAX_MODEL_LEN
            - name: VLLM_GPU_MEMORY_UTILIZATION
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: VLLM_GPU_MEMORY_UTILIZATION
            - name: VLLM_SERVED_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: VLLM_SERVED_MODEL_NAME
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: unpod-secrets
                  key: HF_TOKEN
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: unpod-secrets
                  key: HF_TOKEN
                  optional: true
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: unpod-secrets
                  key: VLLM_API_KEY
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: "4"
              memory: 24Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "7"
              memory: 48Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: vllm-hf-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: unpod
spec:
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
