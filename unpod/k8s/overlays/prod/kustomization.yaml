apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replicas:
  - name: backend-core
    count: 2
  - name: api-services
    count: 2
  - name: web
    count: 2
  - name: centrifugo
    count: 2

# Images rewritten at deploy time by makefile (see deploy-platform).
images:
  - name: unpod-web
    newName: PLACEHOLDER_ECR/unpod-web
    newTag: latest
  - name: unpod-backend-core
    newName: PLACEHOLDER_ECR/unpod-backend-core
    newTag: latest
  - name: unpod-api-services
    newName: PLACEHOLDER_ECR/unpod-api-services
    newTag: latest
