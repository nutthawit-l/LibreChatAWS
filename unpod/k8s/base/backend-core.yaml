apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-core
  labels:
    app: backend-core
    app.kubernetes.io/part-of: unpod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-core
  template:
    metadata:
      labels:
        app: backend-core
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend-core
      containers:
        - name: backend-core
          image: unpod-backend-core:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: unpod-config
            - secretRef:
                name: unpod-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-core
  labels:
    app: backend-core
spec:
  selector:
    app: backend-core
  ports:
    - name: http
      port: 8000
      targetPort: http
